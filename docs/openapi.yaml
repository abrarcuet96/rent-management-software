openapi: "3.0.3"
info:
  title: RentFlow API
  description: |
    Multi-tenant Rent Management SaaS API.

    **Rules enforced at every endpoint:**
    - `public_id` is used in all URLs and responses — internal `id` is never exposed
    - All resources are scoped to the authenticated owner via JWT
    - Soft-deleted resources (`is_active=false`) are treated as not found (404)
    - All monetary values are numbers (`NUMERIC(10,2)` precision)
  version: "1.0.0"

servers:
  - url: http://localhost:8000/api/v1
    description: Local development

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: No JWT required
  - name: Buildings
  - name: Apartments
  - name: Tenants
  - name: Agreements
  - name: Monthly Dues
  - name: Payments
  - name: Expenses
  - name: Expense Categories
  - name: Dashboard
  - name: Reports

# ================================================================
# COMPONENTS
# ================================================================
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # --------------------------------------------------------------
  # Reusable path parameters
  # --------------------------------------------------------------
  parameters:
    page:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
        minimum: 1
    page_size:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    building_public_id:
      name: building_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    apartment_public_id:
      name: apartment_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    tenant_public_id:
      name: tenant_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    due_public_id:
      name: due_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    expense_public_id:
      name: expense_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    category_public_id:
      name: category_public_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  # --------------------------------------------------------------
  # Reusable error responses
  # --------------------------------------------------------------
  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            data: null
            message: "Authentication required"
    Forbidden:
      description: Authenticated but not authorized for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            data: null
            message: "Access denied"
    NotFound:
      description: Resource not found or soft-deleted
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            data: null
            message: "Not found"
    BadRequest:
      description: Business logic error (e.g. duplicate unit, conflicting dates, default category delete)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorEnvelope'

  # --------------------------------------------------------------
  # Schemas
  # --------------------------------------------------------------
  schemas:

    # ── Envelopes ──────────────────────────────────────────────
    ErrorEnvelope:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          example: false
        data:
          nullable: true
          example: null
        message:
          type: string

    ValidationErrorEnvelope:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          example: false
        data:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
        message:
          type: string
          example: "Validation failed"

    Pagination:
      type: object
      required: [total, page, page_size]
      properties:
        total:
          type: integer
          description: Total number of matching records
        page:
          type: integer
        page_size:
          type: integer

    # ── Auth ───────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [full_name, email, password]
      properties:
        full_name:
          type: string
          maxLength: 255
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OwnerData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        full_name:
          type: string
        email:
          type: string
          format: email
        created_at:
          type: string
          format: date-time

    TokenData:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        owner:
          $ref: '#/components/schemas/OwnerData'

    # ── Buildings ──────────────────────────────────────────────
    BuildingCreate:
      type: object
      required: [name, address, total_floors]
      properties:
        name:
          type: string
          maxLength: 255
        address:
          type: string
        total_floors:
          type: integer
          minimum: 1

    BuildingUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        address:
          type: string
        total_floors:
          type: integer
          minimum: 1

    BuildingData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        total_floors:
          type: integer
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Apartments ─────────────────────────────────────────────
    ApartmentCreate:
      type: object
      required: [unit_number, floor]
      properties:
        unit_number:
          type: string
          maxLength: 50
        floor:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [vacant, occupied]
          default: vacant

    ApartmentUpdate:
      type: object
      properties:
        unit_number:
          type: string
          maxLength: 50
        floor:
          type: integer
          minimum: 1
        status:
          type: string
          enum: [vacant, occupied]

    ApartmentData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        building_public_id:
          type: string
          format: uuid
        unit_number:
          type: string
        floor:
          type: integer
        status:
          type: string
          enum: [vacant, occupied]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Tenants ────────────────────────────────────────────────
    TenantCreate:
      type: object
      required: [full_name, phone, move_in_date, initial_rent_amount, agreement_start_date]
      properties:
        full_name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        nid_number:
          type: string
          maxLength: 50
          nullable: true
        address:
          type: string
          nullable: true
        member_count:
          type: integer
          minimum: 1
          default: 1
        move_in_date:
          type: string
          format: date
        initial_rent_amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: "Rent for the initial agreement"
        agreement_start_date:
          type: string
          format: date
          description: "Start date for the initial agreement (typically same as move_in_date)"

    TenantUpdate:
      type: object
      properties:
        full_name:
          type: string
          maxLength: 255
        phone:
          type: string
          maxLength: 20
        nid_number:
          type: string
          maxLength: 50
          nullable: true
        address:
          type: string
          nullable: true
        member_count:
          type: integer
          minimum: 1

    TenantMoveOutRequest:
      type: object
      required: [move_out_date]
      properties:
        move_out_date:
          type: string
          format: date

    TenantData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        apartment_public_id:
          type: string
          format: uuid
        full_name:
          type: string
        phone:
          type: string
        nid_number:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        member_count:
          type: integer
        move_in_date:
          type: string
          format: date
        move_out_date:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Tenant Agreements ──────────────────────────────────────
    AgreementCreate:
      type: object
      required: [rent_amount, start_date]
      properties:
        rent_amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true

    AgreementData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        tenant_public_id:
          type: string
          format: uuid
        rent_amount:
          type: number
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Monthly Dues ───────────────────────────────────────────
    DueGenerateRequest:
      type: object
      required: [month, year]
      properties:
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
          minimum: 2000
          maximum: 2100
        due_date:
          type: string
          format: date
          nullable: true
          description: "Custom due date. Defaults to the 1st of the month if omitted."

    DueAdjustRequest:
      type: object
      properties:
        total_due:
          type: number
          minimum: 0
          description: "Override total_due (e.g. to add an extra charge not tracked via due_expense)"
        due_date:
          type: string
          format: date
          nullable: true

    MonthlyDueData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        tenant_public_id:
          type: string
          format: uuid
        agreement_public_id:
          type: string
          format: uuid
        month:
          type: integer
          minimum: 1
          maximum: 12
        year:
          type: integer
        rent_amount:
          type: number
        total_due:
          type: number
        amount_paid:
          type: number
        remaining_balance:
          type: number
        status:
          type: string
          enum: [unpaid, partial, paid]
        is_auto_generated:
          type: boolean
        due_date:
          type: string
          format: date
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Payments ───────────────────────────────────────────────
    PaymentCreate:
      type: object
      required: [amount_paid, paid_on]
      properties:
        amount_paid:
          type: number
          minimum: 0
          exclusiveMinimum: true
        paid_on:
          type: string
          format: date
        note:
          type: string
          nullable: true

    BulkPaymentRequest:
      type: object
      required: [tenant_public_id, amount, paid_on]
      properties:
        tenant_public_id:
          type: string
          format: uuid
          description: "Target tenant — must belong to the authenticated owner"
        amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: "Total to distribute oldest-first across unpaid and partial dues"
        paid_on:
          type: string
          format: date
        note:
          type: string
          nullable: true

    PaymentRecordData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        due_public_id:
          type: string
          format: uuid
        amount_paid:
          type: number
        paid_on:
          type: string
          format: date
        note:
          type: string
          nullable: true
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    BulkPaymentResult:
      type: object
      properties:
        total_applied:
          type: number
        dues_updated:
          type: array
          items:
            type: object
            properties:
              due_public_id:
                type: string
                format: uuid
              month:
                type: integer
              year:
                type: integer
              applied_amount:
                type: number
              new_status:
                type: string
                enum: [partial, paid]

    # ── Expenses ───────────────────────────────────────────────
    ExpenseCreate:
      type: object
      required: [category_public_id, amount, expense_date, scope]
      properties:
        building_public_id:
          type: string
          format: uuid
          nullable: true
          description: "Required when scope=building or scope=apartment"
        apartment_public_id:
          type: string
          format: uuid
          nullable: true
          description: "Required when scope=apartment; building_public_id must also be set"
        category_public_id:
          type: string
          format: uuid
        description:
          type: string
          nullable: true
        amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
        expense_date:
          type: string
          format: date
        scope:
          type: string
          enum: [building, apartment]
        is_tenant_charged:
          type: boolean
          default: false
        due_public_id:
          type: string
          format: uuid
          nullable: true
          description: "Required when is_tenant_charged=true"
        charged_amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          nullable: true
          description: "Required when is_tenant_charged=true; amount charged to the tenant's due"

    ExpenseUpdate:
      type: object
      properties:
        category_public_id:
          type: string
          format: uuid
        description:
          type: string
          nullable: true
        amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
        expense_date:
          type: string
          format: date
        is_tenant_charged:
          type: boolean

    ExpenseData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        owner_public_id:
          type: string
          format: uuid
        building_public_id:
          type: string
          format: uuid
          nullable: true
        apartment_public_id:
          type: string
          format: uuid
          nullable: true
        category_public_id:
          type: string
          format: uuid
        category_name:
          type: string
        description:
          type: string
          nullable: true
        amount:
          type: number
        expense_date:
          type: string
          format: date
        scope:
          type: string
          enum: [building, apartment]
        is_tenant_charged:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Expense Categories ─────────────────────────────────────
    CategoryCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
        is_default:
          type: boolean
          default: false

    CategoryUpdate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255

    CategoryData:
      type: object
      properties:
        public_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time

    # ── Dashboard ──────────────────────────────────────────────
    DashboardSummaryData:
      type: object
      properties:
        month:
          type: integer
        year:
          type: integer
        total_rent_collected:
          type: number
        total_rent_outstanding:
          type: number
        total_expenses:
          type: number
        net_profit_loss:
          type: number
          description: "total_rent_collected - total_expenses"
        total_apartments:
          type: integer
        occupied_apartments:
          type: integer
        vacant_apartments:
          type: integer
        overdue_tenants_count:
          type: integer

    OverdueItem:
      type: object
      properties:
        tenant_public_id:
          type: string
          format: uuid
        tenant_name:
          type: string
        apartment_unit:
          type: string
        building_name:
          type: string
        overdue_months:
          type: array
          items:
            type: object
            properties:
              due_public_id:
                type: string
                format: uuid
              month:
                type: integer
              year:
                type: integer
              remaining_balance:
                type: number
              status:
                type: string
                enum: [unpaid, partial]
        total_outstanding:
          type: number

    # ── Reports ────────────────────────────────────────────────
    PaymentHistoryEntry:
      type: object
      properties:
        due_public_id:
          type: string
          format: uuid
        month:
          type: integer
        year:
          type: integer
        rent_amount:
          type: number
        total_due:
          type: number
        amount_paid:
          type: number
        remaining_balance:
          type: number
        status:
          type: string
          enum: [unpaid, partial, paid]
        due_date:
          type: string
          format: date
          nullable: true
        payments:
          type: array
          items:
            $ref: '#/components/schemas/PaymentRecordData'

# ================================================================
# PATHS
# ================================================================
paths:

  # ==============================================================
  # AUTH
  # ==============================================================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new owner account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        "201":
          description: Account created, JWT returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/TokenData'
                  message: { type: string, example: "Account created" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/TokenData'
                  message: { type: string, example: "Login successful" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  # ==============================================================
  # BUILDINGS
  # ==============================================================
  /buildings:
    get:
      tags: [Buildings]
      summary: List all buildings for the authenticated owner
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
      responses:
        "200":
          description: Buildings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/BuildingData'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
                  message: { type: string, example: "OK" }
        "401":
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Buildings]
      summary: Create a new building
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildingCreate'
      responses:
        "201":
          description: Building created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/BuildingData'
                  message: { type: string, example: "Building created" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /buildings/{building_public_id}:
    parameters:
      - $ref: '#/components/parameters/building_public_id'
    get:
      tags: [Buildings]
      summary: Get a single building
      responses:
        "200":
          description: Building details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/BuildingData'
                  message: { type: string, example: "OK" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Buildings]
      summary: Update building details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BuildingUpdate'
      responses:
        "200":
          description: Building updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    $ref: '#/components/schemas/BuildingData'
                  message: { type: string, example: "Building updated" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Buildings]
      summary: Soft delete a building
      description: "Returns 400 if the building has active apartments."
      responses:
        "200":
          description: Building deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { nullable: true, example: null }
                  message: { type: string, example: "Building deactivated" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ==============================================================
  # APARTMENTS
  # ==============================================================
  /buildings/{building_public_id}/apartments:
    parameters:
      - $ref: '#/components/parameters/building_public_id'
    get:
      tags: [Apartments]
      summary: List apartments in a building
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
        - name: status
          in: query
          schema:
            type: string
            enum: [vacant, occupied]
      responses:
        "200":
          description: Apartments list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ApartmentData'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
                  message: { type: string, example: "OK" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Apartments]
      summary: Create an apartment in a building
      description: "unit_number must be unique within the building."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApartmentCreate'
      responses:
        "201":
          description: Apartment created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
