  # ==============================================================
  /dues/{due_public_id}/payments:
    parameters:
      - $ref: '#/components/parameters/due_public_id'
    get:
      tags: [Payments]
      summary: List all payment records for a monthly due
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/page_size'
      responses:
        "200":
          description: Payment records
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/PaymentRecordData'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
                  message: { type: string, example: "OK" }
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Payments]
      summary: Record a payment against a monthly due
      description: |
        Inserts a PaymentRecord and recalculates remaining_balance on the MonthlyDue.
        Status transitions: unpaid → partial → paid (never backwards).
        Returns 400 if amount_paid would exceed remaining_balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentCreate'
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      payment:
                        $ref: '#/components/schemas/PaymentRecordData'
                      due:
                        $ref: '#/components/schemas/MonthlyDueData'
                  message: { type: string, example: "Payment recorded" }
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /dues/payments/bulk:
    post:
      tags: [Payments]
      summary: Apply a bulk payment distributed oldest-due-first across a tenant's dues
      description: |
        Distributes `amount` across the tenant's unpaid and partial dues, oldest
        month first. Creates one PaymentRecord per due touched.
      requestBody:
        required: true
