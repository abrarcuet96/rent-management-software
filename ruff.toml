line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[lint.per-file-ignores]
# SQLAlchemy relationship() forward refs are strings resolved at runtime
"backend/app/models/*.py" = ["F821"]

[format]
quote-style = "double"
indent-style = "space"
